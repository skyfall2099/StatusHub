{% extends 'base.html' %}
{% block content %}
    <div class="content">
        <h2>编辑服务器</h2>
        <form method="POST" action="/edit_server/{{ server.id }}">
            <div>
                <label for="name">名称：</label>
                <input type="text" id="name" name="name" value="{{ server.name }}" required>
            </div>
            <div>
                <label for="ip">IP地址：</label>
                <input type="text" id="ip" name="ip" value="{{ server.ip }}" required>
            </div>
            <div>
                <label for="port">端口：</label>
                <input type="number" id="port" name="port" value="{{ server.port }}" required>
            </div>
            <div>
                <label for="username">用户名：</label>
                <input type="text" id="username" name="username" value="{{ server.username }}" required>
            </div>
            <div>
                <label for="password">密码：</label>
                <input type="password" id="password" name="password" placeholder="留空则不修改">
            </div>
            <div>
                <input type="submit" value="保存" class="btn">
                <a href="/servers" class="btn btn-danger">取消</a>
            </div>
        </form>
    </div>
{% endblock %}
