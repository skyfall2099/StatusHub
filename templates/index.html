{% extends 'base.html' %}
{% block content %}
    <div class="content">
        <h2>欢迎使用服务器监控系统</h2>
        <p>这是一个轻量级的服务器监控系统，用于监控服务器状态和部署监控Agent。</p>
        <div style="margin-top: 30px;">
            <h3>系统功能</h3>
            <ul>
                <li>服务器管理：添加和管理服务器信息</li>
                <li>监控工具：浏览和管理监控脚本</li>
                <li>部署管理：部署监控Agent到目标服务器</li>
                <li>仪表盘：查看服务器监控状态</li>
            </ul>
        </div>
    </div>
{% endblock %}
